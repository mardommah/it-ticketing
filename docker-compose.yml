services:
  bot:
    build:
      context: ./whatsapp-bot
      dockerfile: Dockerfile
    container_name: it_ticketing_bot
    restart: unless-stopped
    ports:
      - "3009:3009"
    volumes:
      # Mounting source code
      - ./whatsapp-bot:/usr/src/app
      # Bind mounting auth data for persistence
      - ./whatsapp-bot/auth_info_baileys:/usr/src/app/auth_info_baileys
      # Prevents container's node_modules from being overwritten
      - /usr/src/app/node_modules
    # DISABLED env_file because Dokploy will use the "environment" section below
    # env_file:
    #   - ./whatsapp-bot/.env
    environment:
      # These allow Dokploy to override values via its UI
      - PORT=3009
      - SCAN_TOKEN=${SCAN_TOKEN:-185794c97d0f01ed}
      - LARAVEL_URL=${LARAVEL_URL:-http://localhost:8000}
      - WEBHOOK_TOKEN=${WEBHOOK_TOKEN:-aowkowkowkow}
      - ALLOWED_GROUPS=${ALLOWED_GROUPS:-}
