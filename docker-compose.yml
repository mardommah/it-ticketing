version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: it_ticketing_app
    restart: unless-stopped
    volumes:
      - ./:/var/www
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ticketing
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      - db
    networks:
      - ticketing-network

  webserver:
    image: nginx:alpine
    container_name: it_ticketing_webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ticketing-network

  db:
    image: mysql:8.0
    container_name: it_ticketing_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ticketing
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - ticketing-network

  bot:
    build:
      context: ./whatsapp-bot
      dockerfile: Dockerfile
    container_name: it_ticketing_bot
    restart: unless-stopped
    volumes:
      - ./whatsapp-bot:/usr/src/app
      - bot-auth-data:/usr/src/app/auth_info_baileys
    environment:
      - LARAVEL_URL=http://webserver
      - WEBHOOK_TOKEN=aowkowkowkow
      - ALLOWED_GROUPS=
    depends_on:
      - webserver
    networks:
      - ticketing-network

networks:
  ticketing-network:
    driver: bridge

volumes:
  db-data:
  bot-auth-data:
