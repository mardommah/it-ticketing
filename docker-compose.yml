version: '3.8'

services:
  bot:
    build:
      context: ./whatsapp-bot
      dockerfile: Dockerfile
    container_name: it_ticketing_bot
    restart: unless-stopped
    volumes:
      # Mounting source code for live updates (optional on VPS, but helpful)
      - ./whatsapp-bot:/usr/src/app
      # Bind mounting auth data to a local directory for persistence and easy access
      - ./whatsapp-bot/auth_info_baileys:/usr/src/app/auth_info_baileys
      # Prevents container's node_modules from being overwritten by host's empty node_modules
      - /usr/src/app/node_modules
    env_file:
      - ./whatsapp-bot/.env
